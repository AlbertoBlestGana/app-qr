<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Registro QR</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
text-align:center;
margin:10px;
background:#f5f5f5;
}

h1{
font-size:24px;
margin-bottom:20px;
color:#0f6c6d;
}

h4{
margin-bottom:5px;
color:#555;
}

input{
padding:10px;
margin:5px;
width:80%;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 18px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
background:#0f6c6d;
color:white;
}

button:hover{
opacity:0.9;
}

#app{
display:none;
}

#reader{
width:300px;
margin:auto;
}

#historial{
max-height:200px;
overflow-y:auto;
border:1px solid #ccc;
padding:5px;
background:white;
}

#contador{
font-size:20px;
font-weight:bold;
margin:10px;
}

#btnSiguiente{
display:none;
background:#2c7be5;
}

.logo{
width:200px;
margin-top:30px;
display:block;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>REGISTRO DE USO DE EQUIPOS</h1>

<div id="login">

<h4>Estudiante</h4>

<input id="nombreCompleto" placeholder="Nombre y Apellido"><br>

<button onclick="guardarUsuario()">Continuar</button>

<img src="logo.png" class="logo">

</div>

<div id="app">

<h3 id="usuario"></h3>

<div id="contador">Escaneados: 0</div>

<button onclick="siguienteEstudiante()">➡ Siguiente estudiante</button>
<button onclick="deshacer()">↩ Deshacer último</button>
<button onclick="finalizarRegistro()">📊 Exportar Excel</button>

<h2>Escaneo</h2>

<div id="reader"></div>

<p id="resultado"></p>

<button id="btnSiguiente" onclick="siguientePaso()">➡ Escanear curso</button>

<h2>Historial</h2>

<div id="historial"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="app.js"></script>

</body>
</html>
